spring.application.name=banking-app-backend
server.port=8090

spring.datasource.url=jdbc:h2:mem:banking-app;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=/swagger-ui.html

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# JWT configuration
app.jwt.secret=your-256-bit-secret-key-here-make-it-long-enough-for-hs256-algorithm
app.jwt.expiration-ms=86400000
